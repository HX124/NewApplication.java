<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>失效可视化</title>
  <link rel="stylesheet" href="../css/modal-form-common.css">
  <link rel="stylesheet" href="../css/DFMEA-page-6.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="dfmea-container">
  <div class="edit-container">
    <div class="edit-tabs">
      <button class="tab-btn active" onclick="showChart()"><i class="fas fa-project-diagram"></i> 失效树</button>
      <button class="tab-btn" onclick="showTable()"><i class="fas fa-table"></i> 失效关系表</button>
    </div>
    <div class="edit-actions">
      <button class="action-btn primary" onclick="exportData(this)"><i class="fas fa-paper-plane"></i> 导出失效树</button>
    </div>
  </div>
  
  <div class="content-box">
    <div id="chart-section">
      <div id="chart-container"></div>
    </div>
    
    <div id="table-section" class="hidden">
      <div class="table-wrapper">
        <table id="table-container">
          <thead>
            <tr>
              <th>上一较高级别(FE)</th>
              <th>关注要素(FM)</th>
              <th>下一较低级别或特性类型(FC)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div id="context-menu" class="context-menu">
  <ul>
    <li onclick="handleAddFailure()"><i class="fas fa-plus-circle"></i> 新增失效模式</li>
    <li onclick="handleEdit()"><i class="fas fa-edit"></i> 编辑失效模式</li>
  </ul>
</div>

<!-- 弹窗 - 更新为失效库相同的结构 -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="element-form">
      <div class="modal-body">
        <!-- 表单内容由JS动态生成 -->
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-cancel" onclick="closeModal()">取消</button>
        <button type="submit" class="modal-submit">确认</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="..\js\DFMEA-page-6.js"></script>
</body>
</html>
