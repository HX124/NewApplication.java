<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOD评分表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    body {
      background-color: #f5f7fa;
      color: #333;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden; /* 禁止整个页面横向滚动 */
    }
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .page-title {
      font-size: 24px;
      color: #2f4050;
      font-weight: 600;
    }
    .fmea-info {
      background-color: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .info-label {
      font-size: 12px;
      color: #999;
    }
    .info-value {
      font-size: 16px;
      font-weight: 500;
      color: #2f4050;
    }
    .info-value.code {
      color: #165DFF;
    }
    .info-value.status {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-processing {
      background-color: #fff7e6;
      color: #ff7d00;
    }
    .status-completed {
      background-color: #e8f8f0;
      color: #00b42a;
    }
    .status-paused {
      background-color: #fef0f0;
      color: #f53f3f;
    }
    .status-pending {
      background-color: #f5f5f5;
      color: #909399;
    }
    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .editor-section {
      flex: 1;
      min-width: 300px;
      max-width: 100%;
    }
    .template-section {
      flex: 1;
      min-width: 300px;
      max-width: 100%;
    }
    .section-card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .section-header {
      background-color: #f8f9fa;
      padding: 15px 20px;
      border-bottom: 1px solid #e6e6e6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #2f4050;
    }
    .sod-tabs {
      display: flex;
      background-color: #f5f5f5;
      border-radius: 6px;
      overflow: hidden;
    }
    .sod-tab {
      padding: 8px 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      border: none;
      background: transparent;
      transition: all 0.3s;
    }
    .sod-tab.active {
      background-color: #165DFF;
      color: #fff;
    }
    .section-content {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 500px;
    }
    .editor-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #2f4050;
    }
    .form-label .required {
      color: #F53F3F;
    }
    .form-label .optional {
      color: #999;
      font-size: 12px;
      font-weight: normal;
    }
    .form-input, .form-textarea {
      padding: 10px 15px;
      border: 1px solid #e6e6e6;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #165DFF;
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
    }
    .form-textarea {
      min-height: 80px;
      resize: vertical;
    }
    .score-item {
      background-color: #fafbfc;
      border: 1px solid #e6e6e6;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
      width: 100%;
      box-sizing: border-box;
    }
    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e6e6e6;
    }
    .score-value {
      font-size: 18px;
      font-weight: 600;
      color: #165DFF;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e8f4ff;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .score-description {
      font-size: 14px;
      font-weight: 500;
      color: #2f4050;
      flex: 1;
      margin-left: 10px;
    }
    /* 模板表格样式 - 自适应不横向滚动 */
    .template-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .template-table-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
    }
    .template-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }
    .template-table th, .template-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #e6e6e6;
      font-size: 14px;
      vertical-align: top;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      max-width: 100%;
      box-sizing: border-box;
    }
    .template-table th {
      background-color: #f8f9fa;
      font-weight: 600;
      color: #2f4050;
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    .template-table tbody tr:hover {
      background-color: #fafbfc;
    }
    .score-cell {
      font-weight: 600;
      color: #165DFF;
      width: 80px;
      min-width: 60px;
      max-width: 80px;
    }
    .description-cell {
      min-width: 150px;
    }
    .example-cell {
      min-width: 150px;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      padding: 20px;
      border-top: 1px solid #e6e6e6;
      background-color: #fff;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background-color: #165DFF;
      color: #fff;
    }
    .btn-primary:hover {
      background-color: #0D52D9;
    }
    .btn-secondary {
      background-color: #f5f7fa;
      color: #666;
      border: 1px solid #e6e6e6;
    }
    .btn-secondary:hover {
      background-color: #e8eaed;
      border-color: #d9d9d9;
    }
    .btn-success {
      background-color: #00B42A;
      color: #fff;
    }
    .btn-success:hover {
      background-color: #009922;
    }
    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }
    .dimension-info {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .editor-section, .template-section {
        width: 100%;
      }
      .fmea-info {
        flex-direction: column;
        gap: 15px;
      }
      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .sod-tabs {
        width: 100%;
        justify-content: center;
      }
      .sod-tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        font-size: 13px;
      }
      .template-table th, .template-table td {
        padding: 10px 12px;
        font-size: 13px;
      }
      .score-cell {
        width: 60px;
        min-width: 50px;
        max-width: 60px;
      }
      .actions {
        justify-content: center;
      }
      .btn {
        padding: 8px 16px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .page-title {
        font-size: 20px;
      }
      .template-table th, .template-table td {
        padding: 8px 10px;
        font-size: 12px;
      }
      .score-cell {
        width: 50px;
        min-width: 40px;
        max-width: 50px;
      }
    }

    /* 滚动条样式 */
    .section-content::-webkit-scrollbar,
    .template-table-wrapper::-webkit-scrollbar {
      width: 6px;
    }
    .section-content::-webkit-scrollbar-track,
    .template-table-wrapper::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }
    .section-content::-webkit-scrollbar-thumb,
    .template-table-wrapper::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    .section-content::-webkit-scrollbar-thumb:hover,
    .template-table-wrapper::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>
<body>
<div class="main-content">
  <!-- 页面头部 -->
  <div class="page-header">
    <div class="page-title">SOD评分表</div>
    <div class="sod-tabs" id="sodTabs">
      <button class="sod-tab active" data-type="S">严重度(S)</button>
      <button class="sod-tab" data-type="O">发生度(O)</button>
      <button class="sod-tab" data-type="D">探测度(D)</button>
    </div>
  </div>

  <!-- FMEA项目信息 -->
  <div class="fmea-info" id="fmeaInfo">
    <div class="info-item">
      <span class="info-label">FMEA名称</span>
      <span class="info-value" id="fmeaName">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">FMEA编号</span>
      <span class="info-value code" id="fmeaCode">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">类型</span>
      <span class="info-value" id="projectType">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">状态</span>
      <span class="info-value status status-processing" id="projectStatus">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">责任人</span>
      <span class="info-value" id="responsiblePerson">-</span>
    </div>
  </div>

  <!-- 主要内容区域 -->
  <div class="container">
    <!-- 左侧：编辑区域 -->
    <div class="editor-section">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">
            <span id="editorTitle">严重度(S)评价表</span>
            <div class="dimension-info" id="dimensionDescription">
              评估失效影响的严重程度
            </div>
          </div>
        </div>
        <div class="section-content">
          <form class="editor-form" id="sodForm">
            <!-- 分数1-10的评价项会在这里动态生成 -->
          </form>
        </div>
      </div>
    </div>

    <!-- 右侧：参考模板 -->
    <div class="template-section">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">SOD评分参考模板</div>
        </div>
        <div class="section-content">
          <div class="template-content">
            <div class="template-table-wrapper">
              <table class="template-table" id="templateTable">
                <thead>
                <tr>
                  <th class="score-cell">分数</th>
                  <th class="description-cell" id="templateCol1">失效影响描述</th>
                  <th class="example-cell" id="templateCol2">设备/安全关联示例</th>
                </tr>
                </thead>
                <tbody id="templateBody">
                <!-- 模板内容会在这里动态生成 -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn btn-secondary" id="backBtn">
      <i class="fas fa-arrow-left"></i> 返回列表
    </button>
    <!-- 只保留一个保存按钮 -->
    <button class="btn btn-success" id="saveBtn">
      <i class="fas fa-save"></i> 保存SOD评分表
    </button>
  </div>
</div>

<script>
  // 全局变量
  let currentFmeaCode = '';
  let currentDimension = 'S'; // 当前选中的维度：S/O/D
  let currentProject = null;
  let sodData = {
    S: [], // 严重度数据
    O: [], // 发生度数据
    D: []  // 探测度数据
  };

  // SOD模板数据（从你提供的图片内容中提取）
  const templateData = {
    S: [
      {score: 10, description: "导致减速器完全失效，引发人员伤亡或设备损毁", example: "箱体结构开裂，导致整机解体；齿轮断裂失效碎片飞出，击穿箱体或伤人。"},
      {score: 9, description: "违反安全法规要求", example: "箱体结构损坏（如砂眼、缩孔）未检出，违反设备安全标准。"},
      {score: 8, description: "设备紧急停机，造成生产线重大中断或严重影响维修成本", example: "传动轴疲劳断裂失效，起重机无法起吊，导致港口装卸作业完全中断。"},
      {score: 7, description: "减速器故障后下降，需立即停机检修", example: "轮齿断裂失效或齿面严重点蚀/胶合，导致传动卡滞、异响巨大。"},
      {score: 6, description: "减速器故障引发设备运行不稳定", example: "传动轴弯曲变形，或轴承异常磨损，导致起重机起升、变幅动作抖动、不平稳。"},
      {score: 5, description: "轻微振动加剧，导致旋转部件异常磨损", example: "齿面粘着磨损（胶合）初期，或密封失效导致漏油，增加摩擦阻力。"},
      {score: 4, description: "需额外人工干预才能维持正常功能", example: "润滑系统异常或油脂泄漏，需额外手动清洁滤芯或补油。"},
      {score: 3, description: "仅影响设备维护便利性", example: "密封件老化导致轻微渗油，需缩短维护周期。"},
      {score: 2, description: "仅产生可忽略的噪音或振动", example: "齿面轻微磨损，产生噪声于背景的、稳定的运行噪音。"},
      {score: 1, description: "无实际影响（外观瑕疵）", example: "箱体表面涂层划伤。"}
    ],
    O: [
      {score: 10, description: "几乎必然（2次/周）", example: "港口多尘环境，未有效过滤，导致润滑油污染，引起持续的磨粒磨损。"},
      {score: 9, description: "极高（1次/月 ~ 1次/周）", example: "润滑管理不当，导致齿面胶合或轴承异常磨损。"},
      {score: 8, description: "高（1次/年 ~ 1次/月）", example: "轴端密封失效，导致齿面漏气、盐雾进入，加速腐蚀与磨损。"},
      {score: 7, description: "中等偏高（1次/3年 ~ 1次/年）", example: "频繁起吊冲击载荷，超出设计余量，导致传动轴疲劳裂纹萌生或轮齿过载断裂风险增加。"},
      {score: 6, description: "中等（1次/5年 ~ 1次/3年）", example: "安装过程中不良长期存在，导致传动轴弯曲变形及轴承偏磨损伤。"},
      {score: 5, description: "中等偏低（1次/10年 ~ 1次/5年）", example: "轴承保持架结构损坏，在长期运行后显现。"},
      {score: 4, description: "低（1次/20年 ~ 1次/10年）", example: "箱体结构局部缺陷在交变应力下扩展为疲劳裂纹。"},
      {score: 3, description: "极低（1次/设备寿命周期）", example: "材料本身存在极端恶劣的原始缺陷，导致早期轮齿断裂失效。"},
      {score: 2, description: "几乎不可能", example: "在规范操作和完好维护下，发生箱体结构开裂。"},
      {score: 1, description: "不可能", example: "设计、制造、安装、维护全流程受控下，发生传动轴疲劳断裂。"}
    ],
    D: [
      {score: 10, description: "几乎无法检测", example: "箱体内部锈蚀缺陷在扩展为表面裂纹前。"},
      {score: 9, description: "极难检测", example: "传动轴内部微观疲劳裂纹的萌生阶段（长度<1mm）。"},
      {score: 8, description: "较难检测", example: "齿面胶合的初始阶段，未引起明显振动或温度变化时。"},
      {score: 7, description: "中等难度检测", example: "轴承保持架的早期轻微变形或裂纹。"},
      {score: 6, description: "需专项检测", example: "传动轴轻微弯曲变形，需激光对中仪检测。"},
      {score: 5, description: "常规检测可实现", example: "轮齿断裂失效，通过日常停机目视检查或振动冲击信号可发现。"},
      {score: 4, description: "自动监测覆盖", example: "润滑系统异常或油脂泄漏，通过在线油液监测传感器可预警。"},
      {score: 3, description: "实时报警系统", example: "箱体表面涂层划伤，通过设备状态监测系统实时报警。"},
      {score: 2, description: "多重冗余检测", example: "箱体结构局部缺陷在交变应力下扩展为疲劳裂纹。"},
      {score: 1, description: "失效自锁机制", example: "设计上，当发生极端超载时，安全离合器打开，防止轮齿或轴断裂。"}
    ]
  };

  // 维度描述信息
  const dimensionInfo = {
    S: {
      title: "严重度(S)评价表",
      description: "评估失效影响的严重程度",
      col1: "失效影响描述",
      col2: "设备/安全关联示例"
    },
    O: {
      title: "发生度(O)评价表",
      description: "评估失效发生的频率或概率",
      col1: "发生概率描述",
      col2: "港口场景典型失效原因"
    },
    D: {
      title: "探测度(D)评价表",
      description: "评估失效被探测到的难易程度",
      col1: "检测能力描述",
      col2: "港口场景典型失效示例"
    }
  };

  // 页面加载初始化
  document.addEventListener('DOMContentLoaded', function() {
    // 从URL获取FMEA编号
    const urlParams = new URLSearchParams(window.location.search);
    currentFmeaCode = urlParams.get('code');

    if (!currentFmeaCode) {
      alert('未指定FMEA项目！');
      window.location.href = 'scoring rules.html'; // 修改为返回评分规则页面
      return;
    }

    loadProjectData();
    loadSodData();
    initEventListeners();
    renderDimension('S');
  });

  // 加载FMEA项目数据 - 修复：使用与scoring rules.html相同的存储键名
  function loadProjectData() {
    // 修改这里：使用与scoring rules.html相同的存储键名 'seek_fmea_projects'
    const projects = JSON.parse(localStorage.getItem('seek_fmea_projects') || '[]');
    currentProject = projects.find(p => p.fmeaCode === currentFmeaCode);

    if (!currentProject) {
      alert('未找到指定的FMEA项目！');
      window.location.href = 'scoring rules.html'; // 修改为返回评分规则页面
      return;
    }

    // 更新项目信息显示
    document.getElementById('fmeaName').textContent = currentProject.fmeaName || '-';
    document.getElementById('fmeaCode').textContent = currentProject.fmeaCode || '-';
    document.getElementById('projectType').textContent = currentProject.projectType || '-';
    document.getElementById('projectStatus').textContent = currentProject.projectStatus || '-';
    document.getElementById('responsiblePerson').textContent = currentProject.responsiblePerson || '-';

    // 更新状态标签样式
    const statusElement = document.getElementById('projectStatus');
    statusElement.className = 'info-value status';
    switch(currentProject.projectStatus) {
      case '进行中':
        statusElement.classList.add('status-processing');
        break;
      case '已完成':
        statusElement.classList.add('status-completed');
        break;
      case '暂停':
        statusElement.classList.add('status-paused');
        break;
      case '待启动':
        statusElement.classList.add('status-pending');
        break;
    }
  }

  // 加载SOD评分数据
  function loadSodData() {
    const storedData = JSON.parse(localStorage.getItem(`sodData_${currentFmeaCode}`) || '{}');

    // 如果没有存储的数据，使用模板数据
    if (!storedData.S || storedData.S.length === 0) {
      sodData.S = JSON.parse(JSON.stringify(templateData.S));
      sodData.O = JSON.parse(JSON.stringify(templateData.O));
      sodData.D = JSON.parse(JSON.stringify(templateData.D));
    } else {
      sodData.S = storedData.S;
      sodData.O = storedData.O;
      sodData.D = storedData.D;
    }
  }

  // 初始化事件监听
  function initEventListeners() {
    // SOD选项卡切换
    document.querySelectorAll('.sod-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        const type = this.getAttribute('data-type');
        switchDimension(type);
      });
    });

    // 保存按钮 - 只保留一个保存按钮
    document.getElementById('saveBtn').addEventListener('click', saveSODData);

    // 返回按钮 - 修改为返回评分规则管理页面
    document.getElementById('backBtn').addEventListener('click', function() {
      window.location.href = 'scoring rules.html';
    });

    // 表单输入自动保存到内存
    document.getElementById('sodForm').addEventListener('input', function(e) {
      if (e.target.classList.contains('form-input') || e.target.classList.contains('form-textarea')) {
        const score = parseInt(e.target.closest('.score-item').querySelector('.score-value').textContent);
        const field = e.target.getAttribute('data-field');
        const value = e.target.value;

        // 更新内存中的数据
        const index = sodData[currentDimension].findIndex(item => item.score === score);
        if (index !== -1) {
          sodData[currentDimension][index][field] = value;
        }
      }
    });
  }

  // 切换维度
  function switchDimension(type) {
    // 更新选项卡状态
    document.querySelectorAll('.sod-tab').forEach(tab => {
      tab.classList.remove('active');
      if (tab.getAttribute('data-type') === type) {
        tab.classList.add('active');
      }
    });

    currentDimension = type;
    renderDimension(type);
  }

  // 渲染指定维度的编辑界面和模板
  function renderDimension(type) {
    const info = dimensionInfo[type];

    // 更新标题和描述
    document.getElementById('editorTitle').textContent = info.title;
    document.getElementById('dimensionDescription').textContent = info.description;

    // 更新模板表头
    document.getElementById('templateCol1').textContent = info.col1;
    document.getElementById('templateCol2').textContent = info.col2;

    // 渲染编辑表单
    renderEditorForm(type);

    // 渲染模板表格
    renderTemplateTable(type);
  }

  // 渲染编辑表单
  function renderEditorForm(type) {
    const form = document.getElementById('sodForm');
    const data = sodData[type];
    const info = dimensionInfo[type];

    form.innerHTML = '';

    if (!data || data.length === 0) {
      form.innerHTML = '<div class="no-data">暂无数据</div>';
      return;
    }

    // 按分数降序排列（10分到1分）
    data.sort((a, b) => b.score - a.score);

    data.forEach(item => {
      const scoreItem = document.createElement('div');
      scoreItem.className = 'score-item';
      scoreItem.innerHTML = `
        <div class="score-header">
          <div class="score-value">${item.score}</div>
          <div class="score-description">${getScoreDescription(type, item.score)}</div>
        </div>
        <div class="form-group">
          <label class="form-label">
            ${info.col1} <span class="required">*</span>
          </label>
          <textarea class="form-textarea" data-field="description" placeholder="请输入${info.col1}">${item.description || ''}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">
            ${info.col2} <span class="optional">（可选）</span>
          </label>
          <textarea class="form-textarea" data-field="example" placeholder="请输入${info.col2}（非必填）">${item.example || ''}</textarea>
        </div>
      `;
      form.appendChild(scoreItem);
    });
  }

  // 渲染模板表格
  function renderTemplateTable(type) {
    const tbody = document.getElementById('templateBody');
    const data = templateData[type];
    const info = dimensionInfo[type];

    tbody.innerHTML = '';

    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="no-data">暂无模板数据</td></tr>';
      return;
    }

    // 按分数降序排列（10分到1分）
    data.sort((a, b) => b.score - a.score);

    data.forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="score-cell">${item.score}</td>
        <td class="description-cell">${item.description}</td>
        <td class="example-cell">${item.example || '-'}</td>
      `;
      tbody.appendChild(row);
    });
  }

  // 获取分数描述
  function getScoreDescription(type, score) {
    const descriptions = {
      S: {
        10: "灾难性",
        9: "重大",
        8: "严重",
        7: "较高",
        6: "中等",
        5: "较低",
        4: "轻微",
        3: "很轻微",
        2: "可忽略",
        1: "无影响"
      },
      O: {
        10: "几乎必然",
        9: "极高",
        8: "高",
        7: "中等偏高",
        6: "中等",
        5: "中等偏低",
        4: "低",
        3: "极低",
        2: "几乎不可能",
        1: "不可能"
      },
      D: {
        10: "几乎无法检测",
        9: "极难检测",
        8: "较难检测",
        7: "中等难度检测",
        6: "需专项检测",
        5: "常规检测可实现",
        4: "自动监测覆盖",
        3: "实时报警系统",
        2: "多重冗余检测",
        1: "失效自锁机制"
      }
    };

    return descriptions[type][score] || '';
  }

  // 保存SOD评分表
  function saveSODData() {
    // 验证当前维度的必填字段
    const textareas = document.querySelectorAll('#sodForm textarea[data-field="description"]');
    let hasError = false;

    textareas.forEach(textarea => {
      if (!textarea.value.trim()) {
        hasError = true;
        textarea.style.borderColor = '#F53F3F';
        textarea.style.boxShadow = '0 0 0 3px rgba(245, 63, 63, 0.1)';
      }
    });

    if (hasError) {
      alert(`请填写当前${dimensionInfo[currentDimension].col1}的所有必填项！`);
      return;
    }

    // 保存到localStorage
    saveToLocalStorage();

    alert('SOD评分表保存成功！');
  }

  // 保存数据到localStorage
  function saveToLocalStorage() {
    localStorage.setItem(`sodData_${currentFmeaCode}`, JSON.stringify(sodData));
  }
</script>
</body>
</html>
