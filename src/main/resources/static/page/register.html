<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      position: relative;
    }

    /* 动态背景 */
    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      position: relative;
      max-width: 450px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(15, 15, 30, 0.85);
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(76, 195, 247, 0.2);
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #4fc3f7, #29b6f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }

    .header p {
      color: #aaa;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #aaa;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: rgba(30, 30, 50, 0.7);
      color: #fff;
      font-size: 1.05rem;
      border: 1px solid rgba(76, 195, 247, 0.3);
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #4fc3f7;
      box-shadow: 0 0 0 3px rgba(76, 195, 247, 0.2);
    }

    .input-group input::placeholder {
      color: #666;
    }

    .input-group i {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 1.1rem;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #4fc3f7, #29b6f6);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(76, 195, 247, 0.3);
    }

    .btn:hover {
      background: linear-gradient(90deg, #29b6f6, #19a2e6);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 195, 247, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #aaa;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #4fc3f7;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      color: #29b6f6;
      text-decoration: underline;
    }

    .captcha-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #4fc3f7;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 5px 10px;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    .captcha-btn:hover {
      background: rgba(76, 195, 247, 0.1);
    }

    .captcha-btn:disabled {
      color: #666;
      cursor: not-allowed;
    }

    /* 响应式设计 */
    @media (max-width: 480px) {
      .container {
        margin: 50px auto;
        padding: 25px;
      }

      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
<canvas id="background-canvas"></canvas>

<div class="container">
  <div class="header">
    <h1>用户注册</h1>
    <p>创建您的账户，开始使用系统</p>
  </div>

  <!-- 注册表单 -->
  <form id="register-form">
    <!-- 用户名 -->
    <div class="form-group">
      <label for="username">用户名</label>
      <div class="input-group">
        <input type="text" id="username" placeholder="请输入用户名" required>
        <i class="fas fa-user"></i>
      </div>
    </div>

    <!-- 手机号 -->
    <div class="form-group">
      <label for="phone">手机号</label>
      <div class="input-group">
        <input type="tel" id="phone" placeholder="请输入手机号" required>
        <i class="fas fa-mobile-alt"></i>
      </div>
    </div>

    <!-- 邮箱 -->
    <div class="form-group">
      <label for="email">邮箱</label>
      <div class="input-group">
        <input type="email" id="email" placeholder="请输入邮箱地址" required>
        <i class="fas fa-envelope"></i>
      </div>
    </div>

    <!-- 密码 -->
    <div class="form-group" id="password-group">
      <label for="password">密码</label>
      <div class="input-group">
        <input type="password" id="password" placeholder="设置8位以上密码" required>
        <i class="fas fa-lock"></i>
      </div>
      <!-- 密码提示词 -->
      <div id="password-hint" style="font-size: 0.8rem; color: #aaa; margin-top: 5px; display: none;">
        密码必须包含数字、字母、特殊字符(@$^_*#&)，长度最低为8位
      </div>
    </div>

    <!-- 确认密码 -->
    <div class="form-group" id="confirm-password-group">
      <label for="confirm-password">确认密码</label>
      <div class="input-group">
        <input type="password" id="confirm-password" placeholder="请再次输入密码" required>
        <i class="fas fa-lock"></i>
      </div>
      <!-- 确认密码提示词 -->
      <div id="confirm-password-hint" style="font-size: 0.8rem; color: #aaa; margin-top: 5px; display: none;">
        请再次输入密码
      </div>
    </div>

    <!-- 验证码 -->
    <div class="form-group">
      <label for="captcha">验证码</label>
      <div class="input-group">
        <input type="text" id="captcha" placeholder="请输入验证码" required>
        <button type="button" id="send-captcha" class="captcha-btn">发送验证码</button>
      </div>
    </div>

    <button type="submit" class="btn">立即注册</button>
  </form>

  <div class="login-link">
    <p>已有账号？ <a href="#" id="go-to-login">立即登录</a></p>
  </div>
</div>

<script src="../js/password-validation.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // ========== 动态背景（保持不变） ==========
    const canvas = document.getElementById('background-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 150;

    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5,
        color: `rgba(76, 195, 247, ${Math.random() * 0.5 + 0.2})`
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(particle => {
        particle.x += particle.speedX;
        particle.y += particle.speedY;

        if (particle.x < 0 || particle.x > canvas.width) {
          particle.speedX = -particle.speedX;
        }
        if (particle.y < 0 || particle.y > canvas.height) {
          particle.speedY = -particle.speedY;
        }

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fillStyle = particle.color;
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // ========== 验证码发送功能 ==========
    const sendCaptchaBtn = document.getElementById('send-captcha');

    function sendCaptcha() {
      const phone = document.getElementById('phone').value.trim();

      // 验证手机号格式
      if (!phone) {
        alert('请输入手机号！');
        return;
      }

      if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入有效的手机号！');
        return;
      }

      // 发送验证码到后端 - 修改URL
      fetch('http://localhost:8088/user/send-captcha', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ phone: phone })
      })
              .then(response => response.json())
              .then(data => {
                if (data.code === 200) {
                  alert('验证码已发送！测试验证码：123456');
                  startCountdown();
                } else {
                  alert('发送失败：' + data.message);
                }
              })
              .catch(error => {
                console.error('发送验证码失败:', error);
                alert('发送验证码失败，请检查网络');
              });
    }

    function startCountdown() {
      sendCaptchaBtn.disabled = true;
      let timeLeft = 60;

      const timer = setInterval(() => {
        timeLeft--;
        sendCaptchaBtn.textContent = `重新发送 (${timeLeft})`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          sendCaptchaBtn.disabled = false;
          sendCaptchaBtn.textContent = '发送验证码';
        }
      }, 1000);
    }

    sendCaptchaBtn.addEventListener('click', sendCaptcha);

    // 调用密码验证
    initPasswordValidation(
      'password',           // 密码框ID
      'password-hint',      // 密码提示框ID
      'confirm-password',   // 确认密码框ID
      'confirm-password-hint' // 确认密码提示框ID
    );

    // ========== 表单验证和提交 ==========
    const registerForm = document.getElementById('register-form');

    registerForm.addEventListener('submit', async function(e) {
      e.preventDefault();

      // 获取表单数据
      const formData = {
        userName: document.getElementById('username').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirm-password').value,
        captcha: document.getElementById('captcha').value.trim()
      };

      // 前端验证
      if (!formData.userName) {
        alert('请输入用户名！');
        return;
      }

      if (!formData.phone || !/^1[3-9]\d{9}$/.test(formData.phone)) {
        alert('请输入有效的手机号！');
        return;
      }

      if (!formData.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
        alert('请输入有效的邮箱地址！');
        return;
      }

      // 密码规则验证
      const passwordRegex = /^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*[@$^_*#&])[a-zA-Z0-9@$^_*#&]{8,}$/;
      if (!passwordRegex.test(formData.password)) {
        // 触发blur事件显示红色提示
        passwordInput.focus();
        passwordInput.blur();
        return;
      }

      // 确认密码验证
      if (formData.password !== formData.confirmPassword) {
        // 触发blur事件显示红色提示
        confirmPasswordInput.focus();
        confirmPasswordInput.blur();
        return;
      }

      if (!formData.captcha) {
        alert('请输入验证码！');
        return;
      }

      // 开发阶段：验证码暂时固定为123456
      if (formData.captcha !== '123456') {
        alert('验证码错误！测试验证码：123456');
        return;
      }

      try {
        // 调用后端注册API - 修改URL
        const response = await fetch('http://localhost:8088/user/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            userName: formData.userName,
            phone: formData.phone,
            email: formData.email,
            password: formData.password,
            captcha: formData.captcha
          })
        });

        const result = await response.json();

        if (result.code === 200) {
          alert('注册成功！即将跳转到登录页面...');
          // 跳转到登录页（假设登录页在 page/login.html）
          window.location.href = '../page/login.html';
        } else {
          alert('注册失败：' + result.message);
        }
      } catch (error) {
        console.error('注册失败:', error);
        alert('注册失败，请稍后重试');
      }
    });

    // ========== 跳转到登录页 ==========
    document.getElementById('go-to-login').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = '../page/login.html';
    });
  });
</script>
</body>
</html>
